services:
  - type: web
    name: fleetops-api
    runtime: node
    plan: free
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm db:generate && pnpm db:deploy
    startCommand: pnpm api:start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
