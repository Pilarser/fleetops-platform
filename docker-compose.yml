services:
  postgres:
    image: postgres:18-alpine
    container_name: fleetops-postgres
    environment:
      POSTGRES_DB: fleetops
      POSTGRES_USER: fleetops
      POSTGRES_PASSWORD: fleetops
    ports:
      - "5432:5432"
    volumes:
      - fleetops-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleetops -d fleetops"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  fleetops-postgres-data:
